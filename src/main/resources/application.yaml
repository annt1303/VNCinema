spring:
  application:
    name: vncinema

  # Database settings (PostgreSQL)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vncinema}
    username: ${DB_USER:vncinema_user}
    password: ${DB_PASSWORD:vncinema_password}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate settings
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:vncinema_redis_password}

  # Flyway Database Migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# JWT Security Configurations
jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000} # 1 hour
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days

# TMDB Configuration
tmdb:
  api:
    token: ${TMDB_API_TOKEN}
    base-url: "https://api.themoviedb.org/3"
    image-base-url: "https://image.tmdb.org/t/p/w500"
